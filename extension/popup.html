<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>satya</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-container">
    <header>
      <div class="header-copy">
        <h1>satya</h1>
        <p>Review the latest scan with a quick verdict, confidence breakdown, and raw model output.</p>
      </div>
    </header>

    <main>
      <div id="no-result" class="content-section">
        <div class="empty-state-icon">◌</div>
        <p class="empty-title">No image scanned yet.</p>
        <p class="hint">Hover over any image on a website and click the scan button to analyze it.</p>
      </div>

      <div id="loading" class="content-section hidden">
        <div class="spinner"></div>
        <p>Analyzing image...</p>
      </div>

      <div id="result" class="content-section hidden">
        <section class="result-summary">
          <div class="summary-copy">
            <p class="eyebrow">Latest analysis</p>
            <h2 id="assessment" class="assessment"></h2>
          </div>
          <div class="summary-meta">
            <div class="meta-card">
              <label>Analysis Source</label>
              <span id="source" class="value"></span>
            </div>
            <div class="meta-card">
              <label>Scanned</label>
              <span id="timestamp" class="value timestamp-value"></span>
            </div>
          </div>
        </section>

        <div class="result-layout">
          <div id="image-preview">
            <img id="preview-img" src="" alt="Scanned image">
          </div>

          <div id="result-info">
            <div class="metric-card metric-card-score">
              <label>Manipulation Likelihood</label>
              <div class="score-container">
                <div id="score-bar" class="score-bar">
                  <div id="score-fill" class="score-fill"></div>
                </div>
                <span id="score-percentage" class="score-percentage"></span>
              </div>
            </div>

            <div class="metrics-grid">
              <div class="metric-card">
                <label>Authenticity Confidence</label>
                <span id="auth-confidence" class="value metric-value"></span>
              </div>

              <div class="metric-card">
                <label>Manipulation Confidence</label>
                <span id="manip-confidence" class="value metric-value"></span>
              </div>
            </div>

            <div class="metric-card metric-card-wide">
              <label>Detailed Explanation</label>
              <div class="explanation-box">
                <p id="explanation-text"></p>
              </div>
            </div>

            <div id="detailed-results" class="detailed-results metric-card metric-card-wide">
              <details>
                <summary>Raw model output</summary>
                <pre id="raw-data"></pre>
              </details>
            </div>
          </div>
        </div>

        <footer>
          <button id="new-scan-btn" class="button">Scan another image</button>
        </footer>
      </div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
